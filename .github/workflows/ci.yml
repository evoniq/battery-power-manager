name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: uv sync --extra test
      - name: Run tests
        run: uv run pytest -q

  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Generate wizard sidebar BMP for MUI2
        shell: pwsh
        run: |
          uv run python - << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import struct, os

          W, H = 164, 314
          img = Image.new("RGB", (W, H), (30, 30, 30))
          draw = ImageDraw.Draw(img)

          # Gradient-like stripe
          for y in range(H):
              t = y / H
              r = int(30 + t * 20)
              g = int(30 + t * 20)
              b = int(50 + t * 40)
              draw.line([(0, y), (W, y)], fill=(r, g, b))

          # Accent bar at bottom
          draw.rectangle([(0, H-6), (W, H)], fill=(0, 120, 212))

          # Text
          try:
              font = ImageFont.truetype("C:/Windows/Fonts/segoeui.ttf", 15)
              font_sm = ImageFont.truetype("C:/Windows/Fonts/segoeui.ttf", 11)
          except:
              font = ImageFont.load_default()
              font_sm = font

          draw.text((16, 180), "Battery Power", fill=(255,255,255), font=font)
          draw.text((16, 200), "Manager", fill=(255,255,255), font=font)
          draw.text((16, 228), "Devon Systems", fill=(160,160,160), font=font_sm)

          # Save as 24-bit BMP (NSIS MUI2 requirement)
          img.save("installer/assets/wizard_sidebar.bmp")
          print("Sidebar BMP created")
          PYEOF
          uv run python -c "from PIL import Image; print('PIL ok')"

      - name: Download and extract NUT for Windows
        shell: pwsh
        run: |
          $url = "https://github.com/networkupstools/nut/releases/download/v2.8.5/NUT-for-Windows-x86_64-RELEASE-2.8.5-1-fixNSS.7z"
          Write-Host "Downloading NUT for Windows 2.8.5..."
          Invoke-WebRequest $url -OutFile nut-windows.7z
          & "C:\Program Files\7-Zip\7z.exe" x nut-windows.7z -onut-extracted -y | Out-Null
          # Archive contains NUT-for-Windows-*/x86_64-w64-mingw32-nut-server
          $serverDir = Get-ChildItem -Recurse -Directory -Filter "x86_64-w64-mingw32-nut-server" -Path nut-extracted | Select-Object -First 1
          if (-not $serverDir) { throw "x86_64-w64-mingw32-nut-server not found in archive" }
          $nutParent = $serverDir.Parent.FullName
          New-Item -ItemType Directory -Force -Path "nut" | Out-Null
          Copy-Item -Recurse -Force "$nutParent\*" "nut\"
          Write-Host "NUT binaries:"
          Get-ChildItem "nut\x86_64-w64-mingw32-nut-server\sbin" -Filter "*.exe" | Select-Object -ExpandProperty Name
          # Copy EcoFlow config into etc/
          $etcDir = "nut\x86_64-w64-mingw32-nut-server\etc"
          New-Item -ItemType Directory -Force -Path $etcDir | Out-Null
          foreach ($f in @("ups.conf","upsd.conf","upsd.users")) {
            $src = "installer\nut-config\$f"
            if ((Test-Path $src) -and (-not (Test-Path "$etcDir\$f"))) {
              Copy-Item $src "$etcDir\"
            }
          }

      - name: Build
        shell: pwsh
        run: .\build.ps1 -NutDir nut

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BatteryPowerManagerSetup
          path: dist\BatteryPowerManagerSetup.exe
          if-no-files-found: error

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist\BatteryPowerManagerSetup.exe
