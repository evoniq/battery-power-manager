name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: uv sync --extra test
      - name: Run tests
        run: uv run pytest -q

  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Download and extract NUT for Windows
        shell: pwsh
        run: |
          $url = "https://github.com/networkupstools/nut/releases/download/v2.8.5/NUT-for-Windows-x86_64-RELEASE-2.8.5-1-fixNSS.7z"
          Write-Host "Downloading NUT for Windows 2.8.5..."
          Invoke-WebRequest $url -OutFile nut-windows.7z
          & "C:\Program Files\7-Zip\7z.exe" x nut-windows.7z -onut-extracted -y | Out-Null
          $mingw = Get-ChildItem -Recurse -Directory -Filter "mingw64" -Path nut-extracted | Select-Object -First 1
          if (-not $mingw) { throw "mingw64 not found in NUT archive" }
          New-Item -ItemType Directory -Force -Path "nut" | Out-Null
          Copy-Item -Recurse -Force "$($mingw.FullName)" "nut\mingw64"
          Write-Host "NUT sbin:"; Get-ChildItem "nut\mingw64\sbin" -Filter "*.exe" | Select-Object -ExpandProperty Name
          $etcDir = "nut\mingw64\etc"
          New-Item -ItemType Directory -Force -Path $etcDir | Out-Null
          foreach ($f in @("ups.conf","upsd.conf","upsd.users")) {
            $src = "installer\nut-config\$f"
            if ((Test-Path $src) -and (-not (Test-Path "$etcDir\$f"))) { Copy-Item $src "$etcDir\" }
          }

      - name: Build
        shell: pwsh
        run: .\build.ps1 -NutDir nut

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BatteryPowerManagerSetup
          path: dist\BatteryPowerManagerSetup.exe
          if-no-files-found: error

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist\BatteryPowerManagerSetup.exe
